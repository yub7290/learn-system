<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8" />
	<script>
		var coverSupport = 'CSS' in window && typeof CSS.supports === 'function' && (CSS.supports('top: env(a)') ||
			CSS.supports('top: constant(a)'))
		document.write(
			'<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0' +
			(coverSupport ? ', viewport-fit=cover' : '') + '" />')
	</script>
	<title></title>
	<!--preload-links-->
	<!--app-context-->
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
		#app {
			width: 100vw;
			height: 100vh;
			background: linear-gradient(135deg, #0a0e1a, #121a29);
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			overflow: hidden;
			animation: pageFade 1.2s ease-in-out;
		}
		@keyframes pageFade {
			from { opacity: 0; }
			to { opacity: 1; }
		}

		.logo-wrap {
			margin-top: 60px;
			text-align: center;
			color: #ffffff;
			animation: logoFade 1.5s ease-in-out;
		}
		@keyframes logoFade {
			0% { opacity: 0; transform: translateY(20px); }
			100% { opacity: 1; transform: translateY(0); }
		}
		.logo-title {
			font-size: 32px;
			font-weight: 600;
			letter-spacing: 4px;
			margin-bottom: 12px;
		}
		.logo-desc {
			font-size: 18px;
			color: #a0aec0;
			letter-spacing: 2px;
		}
		.loading-tip {
			position: absolute;
			bottom: 80px;
			font-size: 16px;
			color: #718096;
			letter-spacing: 1px;
		}

		.video-wrapper {
			position: relative;
			width: 280px;
			height: 280px;
			border-radius: 50%;
			margin-bottom: 20px;
		}
		.video-circle {
			width: 100%;
			height: 100%;
			border-radius: 50%;
			overflow: hidden;
			position: absolute;
			top: 0;
			left: 0;
			box-shadow: 0 0 40px rgba(91, 143, 249, 0.3), 0 0 80px rgba(66, 184, 121, 0.15);
			animation: breathe 3s ease-in-out infinite alternate;
		}
		@keyframes breathe {
			from { box-shadow: 0 0 40px rgba(91, 143, 249, 0.2), 0 0 60px rgba(66, 184, 121, 0.1); }
			to { box-shadow: 0 0 55px rgba(91, 143, 249, 0.4), 0 0 90px rgba(66, 184, 121, 0.2); }
		}
		video {
			width: 100%;
			height: 100%;
			object-fit: cover;
			display: block;
			pointer-events: none;
		}
		video::-webkit-media-controls {
			display: none !important;
		}
		.enter-btn {
			position: absolute;
			top: 0;
			left: 0;
			width: 280px;
			height: 280px;
			border-radius: 50%;
			background: linear-gradient(145deg, rgba(106, 166, 255, 0.92), rgba(68, 132, 235, 0.88));
			backdrop-filter: blur(10px);
			-webkit-backdrop-filter: blur(10px);
			color: #fff;
			font-size: 46px;
			font-weight: 600;
			letter-spacing: 3px;
			border: none;
			outline: none;
			cursor: pointer;
			display: flex;
			align-items: center;
			justify-content: center;
			box-shadow: 0 8px 30px rgba(68, 132, 235, 0.4), 0 15px 55px rgba(68, 132, 235, 0.3), inset 0 2px 12px rgba(255,255,255,0.25), inset 0 -2px 8px rgba(0,0,0,0.15);
			transition: all 0.35s cubic-bezier(0.34, 1.2, 0.7, 1);
			z-index: 999;
			animation: btnGlow 3s infinite alternate ease-in-out;
		}
		@keyframes btnGlow {
			0% { box-shadow: 0 8px 32px rgba(91,143,249,0.35), 0 15px 60px rgba(91,143,249,0.25), inset 0 2px 12px rgba(255,255,255,0.2); }
			100% { box-shadow: 0 8px 40px rgba(91,143,249,0.65), 0 15px 80px rgba(91,143,249,0.45), inset 0 2px 15px rgba(255,255,0.35); }
		}
		.enter-btn:active {
			transform: scale(0.94);
			background: linear-gradient(145deg, rgba(68,132,235,1), rgba(54, 111, 201, 1));
		}
	</style>
</head>
<body>
	<div id="app">
		<div class="logo-wrap">
			<div class="logo-title">智慧学习平台</div>
			<div class="logo-desc">AI 个性化学习系统</div>
		</div>
		<div class="loading-tip">正在启动...</div>
	</div>

	<script type="module" src="/main"></script>

	<script>
		const app = document.getElementById('app');
		const loadingTip = document.querySelector('.loading-tip');
		const targetRoute = "/pages/index/index";
		const apiUrl = "/api/campus/getStartConfig";
		let isJump = false;

		// 等待uni环境就绪
		function waitUniReady(cb) {
			const t = setInterval(() => {
				if(typeof uni !== 'undefined' && uni.reLaunch) {
					clearInterval(t);
					cb();
				}
			}, 50);
		}

		// 页面跳转
		function goToIndex() {
			if(isJump) return;
			isJump = true;
			uni.reLaunch({
				url: targetRoute,
				fail: () => location.hash = '#' + targetRoute
			});
		}

		// 直接跳转（原进度条分支改为立即跳转）
		function directJump() {
			setTimeout(goToIndex, 300);
		}

		// 动态创建 视频+按钮
		function createVideo(videoUrl) {
			loadingTip.innerText = "点击进入开始体验";

			const videoWrapper = document.createElement('div');
			videoWrapper.className = 'video-wrapper';

			const btn = document.createElement('button');
			btn.className = 'enter-btn';
			btn.innerText = '进入';

			const circle = document.createElement('div');
			circle.className = 'video-circle';

			const video = document.createElement('video');
			video.playsInline = true;
			video.webkitPlaysInline = true;
			video.x5PlaysInline = true;
			video.preload = 'auto';
			video.src = videoUrl;

			circle.appendChild(video);
			videoWrapper.appendChild(btn);
			videoWrapper.appendChild(circle);
			app.insertBefore(videoWrapper, document.querySelector('.logo-wrap'));

			// 点击播放
			btn.onclick = () => {
				btn.style.display = 'none';
				video.muted = false;
				video.play().catch(() => {
					video.muted = true;
					video.play();
				});
			};
			// 播放结束跳转
			video.onended = () => {
				setTimeout(goToIndex, 200);
			};
		}

		// 请求接口分发逻辑
		function fetchData() {
			fetch(apiUrl, {
				method: 'GET',
				headers: {'Content-Type': 'application/json'}
			}).then(res => {
				if(!res.ok) throw new Error();
				const cType = res.headers.get('content-type') || '';
				if(!cType.includes('application/json')) throw new Error();
				return res.json();
			}).then(data => {
				if(data && data.isPlayVideo === true && data.videoUrl && data.videoUrl.trim()) {
					createVideo(data.videoUrl);
				} else {
					// 无视频/参数异常 直接跳转
					directJump();
				}
			}).catch(() => {
				// 接口异常 直接跳转
				directJump();
			});
		}

		// 入口执行
		waitUniReady(() => {
			setTimeout(fetchData, 600);
		});
	</script>
</body>
</html>
