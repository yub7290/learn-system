# ============================================================
# learn-system Nginx 生产环境配置
# 前后端分离部署方案
# ============================================================
# 使用方式：
#   1. 将前端 dist 目录部署到 /var/www/learn-system/
#   2. 后端 Spring Boot 运行在 localhost:8001
#   3. 将本文件放入 /etc/nginx/conf.d/learn-system.conf
#   4. nginx -t && systemctl reload nginx
# ============================================================

upstream backend {
    server 127.0.0.1:8001;
    # 如果有多个后端实例：
    # server 127.0.0.1:8002;
    # server 127.0.0.1:8003;
}

server {
    listen 80;
    server_name _;  # 替换为实际域名，如 learn.example.com

    # 字符集
    charset utf-8;

    # 允许最大上传500MB（与视频上传限制一致）
    client_max_body_size 500M;

    # 前端静态文件根目录
    root /var/www/learn-system;
    index index.html;

    # =========================================
    # 1. API 反向代理
    # =========================================
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时配置（视频上传需要更长时间）
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # =========================================
    # 2. 静态资源（JS / CSS / 图片等）
    # =========================================
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 其他静态文件（favicon.ico 等）
    location = /favicon.ico {
        access_log off;
        expires 30d;
    }

    # =========================================
    # 3. SPA 路由回退
    #    所有非文件、非 API 的请求返回 index.html
    # =========================================
    location / {
        try_files $uri $uri/ /index.html;
    }
}
